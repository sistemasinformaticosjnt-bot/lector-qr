<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; }
        #status { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Escáner a Google Sheets</h2>
    
    <div id="reader"></div>

    <div class="result-box">
        <p>Estado: <span id="status">Esperando cámara...</span></p>
        <p>Último QR: <b id="last-qr">Ninguno</b></p>
    </div>

     

    <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzEQQkp8GzLrVnSPST8lwb8JrAIup97Cjmo1JsTyedCDY_1Jvcu6lgEIfYwovR_lhMK/exec'; 
    const beepSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
    
    // Configuración de la cola
    let colaDeEnvio = [];
    let enviando = false;
    let bloqueadoPorTiempo = false;
    let ultimoCodigo = "";

    // Función que se activa al detectar un QR
    function onScanSuccess(decodedText) {
        // Evitamos escaneos múltiples del mismo código en ráfaga (250ms)
        if (bloqueadoPorTiempo || decodedText === ultimoCodigo) return;

        // 1. Acción inmediata para el usuario
        beepSound.play();
        if (navigator.vibrate) navigator.vibrate(100);
        document.getElementById('last-qr').innerText = decodedText;
        
        // 2. Agregar a la cola y marcar como bloqueado temporalmente
        colaDeEnvio.push(decodedText);
        bloqueadoPorTiempo = true;
        ultimoCodigo = decodedText;

        // Liberar el escáner tras un cuarto de segundo
        setTimeout(() => { 
            bloqueadoPorTiempo = false; 
            ultimoCodigo = ""; // Permitimos volver a escanear el mismo si se desea
        }, 250);

        // 3. Intentar procesar la cola
        procesarCola();
    }

    // Función "Trabajadora" (Worker) que envía datos en segundo plano
    async function procesarCola() {
        if (enviando || colaDeEnvio.length === 0) return;

        enviando = true;
        const codigoActual = colaDeEnvio[0];
        document.getElementById('status').innerText = `Enviando (Q: ${colaDeEnvio.length})...`;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ codigo: codigoActual })
            });
            
            // Si tiene éxito, lo sacamos de la cola
            colaDeEnvio.shift();
            document.getElementById('status').innerText = "Listo";
        } catch (err) {
            document.getElementById('status').innerText = "Error de red, reintentando...";
            console.error("Error al enviar:", err);
            // No lo sacamos de la cola para que reintente en el siguiente ciclo
        }

        enviando = false;
        // Si todavía hay elementos, seguimos procesando
        if (colaDeEnvio.length > 0) {
            setTimeout(procesarCola, 100); // Pequeño respiro entre envíos
        }
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 15, qrbox: { width: 250, height: 250 } },
        onScanSuccess
    );
</script>

</body>
</html>
