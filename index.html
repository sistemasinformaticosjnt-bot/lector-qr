<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR a Google Sheets</title>
    <script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        #preview { width: 80%; max-width: 400px; border-radius: 10px; border: 4px solid #007bff; }
        .info { margin-top: 20px; text-align: center; }
        #status { font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>Escáner de Inventario</h2>
    <video id="preview"></video>
    
    <div class="info">
        <p>Último escaneo: <span id="last-scan">-</span></p>
        <p id="status"></p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzEQQkp8GzLrVnSPST8lwb8JrAIup97Cjmo1JsTyedCDY_1Jvcu6lgEIfYwovR_lhMK/exec'; // <--- PEGA AQUÍ TU URL
        let scanner = new Instascan.Scanner({ video: document.getElementById('preview'), mirror: false });

        scanner.addListener('scan', function (content) {
            document.getElementById('last-scan').innerText = content;
            enviarDatos(content);
        });

        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 0) {
                // En celulares, la cámara trasera suele ser la última de la lista
                let selectedCamera = cameras[cameras.length - 1];
                scanner.start(selectedCamera);
            } else {
                alert('No se encontraron cámaras.');
            }
        }).catch(function (e) {
            console.error(e);
        });

        function enviarDatos(codigo) {
            document.getElementById('status').innerText = "Enviando...";
            
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Importante para evitar bloqueos de CORS
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo: codigo })
            }).then(() => {
                document.getElementById('status').innerText = "¡Guardado con éxito!";
                setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
            }).catch(err => {
                document.getElementById('status').innerText = "Error al enviar";
                console.error(err);
            });
        }
    </script>
</body>
</html>
