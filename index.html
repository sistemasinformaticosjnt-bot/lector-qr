<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .result-box { margin-top: 20px; padding: 15px; background: white; border-radius: 10px; }
        #status { color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Escáner a Google Sheets</h2>
    
    <div id="reader"></div>

    <div class="result-box">
        <p>Estado: <span id="status">Esperando cámara...</span></p>
        <p>Último QR: <b id="last-qr">Ninguno</b></p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzEQQkp8GzLrVnSPST8lwb8JrAIup97Cjmo1JsTyedCDY_1Jvcu6lgEIfYwovR_lhMK/exec'; // <--- ASEGÚRATE QUE SEA LA NUEVA VERSIÓN

        function onScanSuccess(decodedText) {
            document.getElementById('last-qr').innerText = decodedText;
            document.getElementById('status').innerText = "Enviando a Sheets...";
            
            // Sonido de confirmación o vibración (opcional)
            if (navigator.vibrate) navigator.vibrate(100);

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                body: JSON.stringify({ codigo: decodedText })
            })
            .then(() => {
                document.getElementById('status').innerText = "¡Enviado con éxito!";
                // Esperar 3 segundos antes de permitir el siguiente escaneo si lo deseas
            })
            .catch(err => {
                document.getElementById('status').innerText = "Error de red";
                console.error(err);
            });
        }

        // Configuración del escáner
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Iniciar con la cámara trasera automáticamente
        html5QrCode.start(
            { facingMode: "environment" }, // Fuerza el uso de la cámara trasera
            config,
            onScanSuccess
        ).catch(err => {
            document.getElementById('status').innerText = "Error: " + err;
        });
    </script>
</body>
</html>
